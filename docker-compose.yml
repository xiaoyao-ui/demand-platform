  version: '3.8'
  services:
    mysql:
      image: mysql:8.0
      container_name: demand-mysql
      restart: always
      environment:
        MYSQL_ROOT_PASSWORD: root
        MYSQL_DATABASE: demand_db
      ports:
        - "3306:3306"
      volumes:
        - mysql_data:/var/lib/mysql
        - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

    redis:
      image: redis:7-alpine
      container_name: demand-redis
      restart: always
      ports:
        - "6379:6379"
      command: redis-server --appendonly yes

    backend:
      build: .
      container_name: demand-backend
      restart: always
      ports:
        - "8080:8080"
      depends_on:
        - mysql
        - redis
      environment:
        SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/demand_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: root
        SPRING_DATA_REDIS_HOST: redis
        SPRING_DATA_REDIS_PORT: 6379
        FILE_UPLOAD_PATH: /app/uploads
        JWT_SECRET: demandPlatformSecretKey2026ForJWTTokenGenerationAndValidation
        MAIL_USERNAME: quliang316@126.com
        MAIL_PASSWORD: MVeiep57gZSmsfQ7
      volumes:
        - demand_uploads:/app/uploads
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
        interval: 30s
        timeout: 10s
        retries: 3

    nginx:
      image: nginx:alpine
      container_name: demand-nginx
      restart: always
      ports:
        - "80:80"
      volumes:
        - ./nginx.conf:/etc/nginx/nginx.conf
        - ./dist:/usr/share/nginx/html
      depends_on:
        - backend

  volumes:
    mysql_data:
    demand_uploads:
