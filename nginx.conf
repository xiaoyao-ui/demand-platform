events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 开启 gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 256;

    server {
        listen 80;

        # ⚠️ 注意：如果有服务器 IP 或域名，在这里修改
        # server_name localhost;  # 本地测试
        # server_name 192.168.1.100;  # 服务器 IP
        # server_name yourdomain.com;  # 域名
        server_name localhost;

        # 前端静态资源
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html; # 支持 Vue Router History 模式
        }

        # 反向代理到后端
        location /api/ {
            # ⚠️ 注意：如果有服务器 IP，这里的 backend 可能需要改成 IP 地址
            # proxy_pass http://192.168.1.100:8080;
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 头像/附件访问
        location /avatar/ {
            proxy_pass http://backend:8080;
        }

        # WebSocket 支持
        location /ws/ {
            proxy_pass http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
